# .github/workflows/ci.yml — v0.5 SPECS §20 #5.
#
# Cheap per-push / per-PR validation on linux/amd64 only. The five-platform
# cross-build matrix is exercised only when a release tag fires release.yml.

name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Gofmt
        run: |
          out=$(gofmt -l internal cmd pkg)
          if [ -n "$out" ]; then
            echo "::error::gofmt has changes for these files:"
            echo "$out"
            exit 1
          fi
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -race ./...
        env:
          # Live external-API tests stay off in CI.
          LIVE_LLM_TESTS: ''
          LIVE_E2E: ''
