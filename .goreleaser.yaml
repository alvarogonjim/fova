# .goreleaser.yaml — v0.5 SPECS §20 #5.
#
# Run `goreleaser build --snapshot --clean` locally to produce the four binaries
# under `dist/` without publishing. The release workflow (.github/workflows/
# release.yml) runs `goreleaser release --clean` on every tag matching
# v[0-9]+.[0-9]+.[0-9]+* — see docs/RELEASING.md for the full flow.
#
# fova is Unix-only: it shells out to `bash` and a container runtime, so the
# release matrix is darwin/linux × amd64/arm64. No Windows target.

version: 2

project_name: fova

before:
  hooks:
    - go mod tidy

builds:
  - id: fova
    main: ./cmd/fova
    binary: fova
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/alvarogonjim/fova/internal/version.version={{ .Tag }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: fova
    ids:
      - fova
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}darwin{{ else if eq .Os "linux" }}linux{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}amd64{{ else if eq .Arch "arm64" }}arm64{{ else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-dev-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: alvarogonjim
    name: fova
  draft: false
  prerelease: auto
  name_template: "fova {{ .Tag }}"
  # Overwrite same-named assets if the release is re-run for a tag (e.g. a
  # retried or amended release) instead of failing with "already_exists".
  replace_existing_artifacts: true

# Homebrew auto-publish is intentionally disabled: it requires a
# HOMEBREW_TAP_TOKEN secret with push access to alvarogonjim/homebrew-tap.
# To re-enable, add that secret and restore a `brews:` block — see
# homebrew-tap/Formula/fova.rb for the reference template.
