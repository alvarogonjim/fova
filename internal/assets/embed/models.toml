# fova model catalog. API keys are NEVER stored here — api_key_env names the
# environment variable fova reads the key from at run time.

[[provider]]
name        = "anthropic"
kind        = "anthropic"
api_key_env = "ANTHROPIC_API_KEY"

[[provider]]
name        = "openai"
kind        = "openai"
base_url    = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"

[[provider]]
name        = "google"
kind        = "google"
api_key_env = "GOOGLE_API_KEY"

[[provider]]
name        = "ollama"
kind        = "openai"
base_url    = "http://localhost:11434/v1"

[[provider]]
name        = "vllm"
kind        = "openai"
base_url    = "http://localhost:8000/v1"
api_key_env = "VLLM_API_KEY"

[[model]]
id             = "claude-opus-4-7"
display_name   = "Claude Opus 4.7"
provider       = "anthropic"
context_tokens = 200000
supports_tools = true
input_price_per_1m  = 15
output_price_per_1m = 75

