# Test-only legacy fixture — kept so the registry's legacy-recipe parsing,
# placeholder expansion, and venv-mode installer paths stay exercised after
# every real tool has migrated to container mode. Not a real installable tool;
# the doctor reports it as "not installed" and it has no Containerfile.
[tools.legacy_fixture]
display_name = "Legacy fixture (test-only)"
version      = "0.0.0"
python       = "3.11"
repo         = "https://example.com/legacy-fixture"
venv_dir     = "${FOVA_HOME}/tools/legacy_fixture/.venv"
install_steps = [
  "git clone {{ repo }} .",
  "uv venv --python {{ python }} {{ venv_dir }}",
  "uv pip install --python {{ venv_dir }}/bin/python --torch-backend=auto torch==2.8.0",
]
run_command = "{{ venv_dir }}/bin/python /opt/legacy_fixture/run.py {{ args_file }}"
