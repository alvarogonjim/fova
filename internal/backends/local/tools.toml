[tools.bindcraft]
# Container-mode recipe — Bug 14 (supersedes Bug 8's failed requirements.txt
# install). PyRosetta is baked into the image at build time via
# pyrosetta-installer; no per-host PyRosetta install is needed. AlphaFold2
# weights are NOT baked in (they're ~5 GB) — they're downloaded once and
# bind-mounted at run time. The pip list inside bindcraft.Containerfile is
# locked against the live install_bindcraft.sh (verified 2026-05-20).
display_name    = "BindCraft"
version         = "1.5.0"
repo            = "https://github.com/martinpacesa/BindCraft"
disk_gb         = 10.0
extra_data      = ["alphafold_params"]
image_tag       = "fova/bindcraft:v1.5.0"
containerfile   = "bindcraft.Containerfile"
entrypoint      = "python /opt/bindcraft/bindcraft.py --settings {{ input_json }}"
gpu             = true
weights_paths   = []
timeout_seconds = 0
smoke_test      = "python /opt/_base/verify_gpu.py && python /opt/bindcraft/bindcraft.py --help"

[tools.ligandmpnn]
display_name    = "LigandMPNN"
version         = "1.0.0"
repo            = "https://github.com/dauparas/LigandMPNN"
requires_gpu    = true
disk_gb         = 1.5
image_tag       = "fova/ligandmpnn:v1.0.0"
containerfile   = "ligandmpnn.Containerfile"
entrypoint      = "python /opt/ligandmpnn/run.py"
gpu             = true
weights_paths   = ["/models"]
timeout_seconds = 1800
# Smoke test: confirms torch sees CUDA inside the container (the shared
# _base/verify_gpu.py fragment is baked into the image during build) then
# runs the upstream default invocation against the cached weights — proves
# ligandmpnn imports, the checkpoint loads from /models, and a single
# sequence can be sampled on the bundled 1BC8.pdb fixture.
smoke_test = "python -c 'import torch; assert torch.cuda.is_available(), \"no cuda\"; print(f\"torch {torch.__version__} cuda {torch.version.cuda} ok\")' && python /opt/ligandmpnn/run.py --seed 111 --pdb_path /opt/ligandmpnn/inputs/1BC8.pdb --out_folder /tmp/smoke --checkpoint_protein_mpnn /models/proteinmpnn_v_48_020.pt --batch_size 1 --number_of_batches 1"

