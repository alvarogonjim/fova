# Install recipes for the local (uv-managed) protein-design tools.
# Placeholders: ${FOVA_HOME} is the fova home dir; {{ field }} refers to
# this recipe's own fields (repo, git_ref, python, venv_dir, install_dir).
# install_dir defaults to ${FOVA_HOME}/tools/<name> when omitted; git_ref
# defaults to "main".

[tools.ipsae]
display_name    = "ipSAE"
version         = "1.0.0"
repo            = "https://github.com/DunbrackLab/IPSAE"
requires_gpu    = false
disk_gb         = 0.5
image_tag       = "fova/ipsae:v1.0.0"
containerfile   = "ipsae.Containerfile"
entrypoint      = "python /opt/ipsae/ipsae.py {{ pae_file }} {{ structure_file }} {{ pae_cutoff }} {{ dist_cutoff }}"
gpu             = false
weights_paths   = []
timeout_seconds = 300
smoke_test      = "python /opt/ipsae/ipsae.py --help"

[tools.proteinmpnn]
# Container-mode recipe (v0.7, Bug 15). Replaces the v0.6 uv-venv install.
# Weights ship inside the upstream repo (vanilla_model_weights/,
# soluble_model_weights/, ca_model_weights/), so weights_paths is empty — the
# image is self-contained.
display_name    = "ProteinMPNN"
version         = "1.0.1"
repo            = "https://github.com/dauparas/ProteinMPNN"
git_ref         = "main"
requires_gpu    = true
disk_gb         = 0.5
image_tag       = "fova/proteinmpnn:v1.0.1"
containerfile   = "proteinmpnn.Containerfile"
entrypoint      = "python /opt/proteinmpnn/protein_mpnn_run.py"
gpu             = true
weights_paths   = []
timeout_seconds = 1800
smoke_test      = "python /opt/_base/verify_gpu.py && python /opt/proteinmpnn/protein_mpnn_run.py --help"

[tools.rfdiffusion]
display_name    = "RFdiffusion"
version         = "1.1.0"
repo            = "https://github.com/RosettaCommons/RFdiffusion"
requires_gpu    = true
disk_gb         = 5.2
image_tag       = "fova/rfdiffusion:v1.1.0"
containerfile   = "rfdiffusion.Containerfile"
entrypoint      = "python /opt/rfdiffusion/scripts/run_inference.py"
gpu             = true
weights_paths   = ["/models"]
timeout_seconds = 3600
# Smoke test: confirms torch sees CUDA inside the container (the shared
# _base/verify_gpu.py fragment) then runs a 5-residue unconditional design
# against the cached weights to prove rfdiffusion imports and the model
# checkpoint loads. The smoke command runs inside the tool image with
# ~/.fova/models/rfdiffusion mounted at /models.
smoke_test = "python -c 'import torch; assert torch.cuda.is_available(), \"no cuda\"; print(f\"torch {torch.__version__} cuda {torch.version.cuda} ok\")' && python /opt/rfdiffusion/scripts/run_inference.py 'contigmap.contigs=[5-5]' inference.output_prefix=/tmp/smoke inference.num_designs=1 inference.model_directory_path=/models"

# Model weights. Downloaded once into ~/.fova/models/rfdiffusion/ by the
# post-build hook in Installer.installContainer (via models_cache.EnsureWeights)
# and bind-mounted into /models at run time. URLs are taken from the upstream
# RFdiffusion README (Baker lab CDN at files.ipd.uw.edu). SHA256 sums are not
# published upstream; with empty SHA256, EnsureWeights skips checksum
# verification and only ensures each file exists. See open-question in
# docs/tools/rfdiffusion.md for the maintainer follow-up.
[[tools.rfdiffusion.weights]]
url    = "http://files.ipd.uw.edu/pub/RFdiffusion/6f5902ac237024bdd0c176cb93063dc4/Base_ckpt.pt"
path   = "Base_ckpt.pt"
sha256 = ""

