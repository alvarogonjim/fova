# BoltzGen — Stark et al., "BoltzGen: Toward Universal Binder Design" (2026).
# Added in v0.7 as the SPECS-blessed alternative binder method on aarch64
# (Grace CPU / GB10), where BindCraft is blocked by the upstream PyRosetta
# wheel gap. BoltzGen has no PyRosetta dependency and runs on both x86_64
# and aarch64. Weights (~6 GB, includes Boltz-2 refolding) download from
# HuggingFace at first run via HF_HOME=/models — not pre-fetched via the
# Weights array because HuggingFace uses LFS pointers/chunked transfers
# that EnsureWeights doesn't yet model.
[tools.boltzgen]
