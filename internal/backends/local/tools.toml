[tools.boltz2]
display_name    = "Boltz-2"
version         = "2.2.1"
repo            = "https://github.com/jwohlwend/boltz"
requires_gpu    = true
disk_gb         = 15.0
image_tag       = "fova/boltz2:v2.2.1"
containerfile   = "boltz2.Containerfile"
entrypoint      = "boltz predict"
gpu             = true
weights_paths   = ["/models"]
timeout_seconds = 3600
# Smoke test (Bug 20): a 30-aa monomer fold against the cached weights.
# First half exercises the shared _base/verify_gpu.py contract; second half
# writes a tiny YAML on the container's tmpfs, runs `boltz predict` with
# --override (don't reuse stale tmp), --use_msa_server disabled by passing
# `msa: empty` to skip the network MSA dance, then asserts the produced PDB
# (or CIF) has > 0 ATOM records. The smoke runs inside the tool image with
# ~/.fova/models/boltz2 mounted at /models/boltz2 — `boltz predict --cache
# /models/boltz2` points the in-process downloader at the host cache so it
# never refetches.
smoke_test = """
python -c 'import torch; assert torch.cuda.is_available(), "no cuda"; print(f"torch {torch.__version__} cuda {torch.version.cuda} ok")' \
 && mkdir -p /tmp/boltz_smoke \
 && printf 'sequences:\\n  - protein:\\n      id: A\\n      sequence: MKQHKAMIVALIVICITAVVAALVTRKDLC\\n      msa: empty\\n' > /tmp/boltz_smoke/in.yaml \
 && boltz predict /tmp/boltz_smoke/in.yaml --out_dir /tmp/boltz_smoke/out --cache /models/boltz2 --override --output_format pdb --no_kernels \
 && test "$(find /tmp/boltz_smoke/out -name '*.pdb' -exec grep -c '^ATOM' {} \\; | head -1)" -gt 0
"""

# Model weights for Boltz-2. Downloaded once into ~/.fova/models/boltz2/
# by the post-build hook in Installer.installContainer (via
# models_cache.EnsureWeights) and bind-mounted at /models/boltz2 at run time.
#
# URLs are taken directly from upstream's bundled downloader in
# src/boltz/main.py (CCD_URL / MOL_URL / the two _conf.ckpt + _aff.ckpt URL
# lists). We pin the HuggingFace mirrors (not the model-gateway.boltz.bio
# convenience host) so a Cloudflare cache miss never silently hits a
# different bucket. Total: ~6.13 GB.
#
# SHA256: not published upstream. Upstream uses urllib.request.urlretrieve
# without any checksum verification, and HuggingFace does not expose a
# canonical .sha256 sidecar for these files. With empty `sha256`,
# EnsureWeights treats existence as sufficient (matches rfdiffusion's
# baseline). Filling these in is the maintainer's Phase 3 follow-up once
# the GB10 has fetched a known-good copy and a baseline digest can be cut.
[[tools.boltz2.weights]]
url    = "https://huggingface.co/boltz-community/boltz-1/resolve/main/ccd.pkl"
path   = "ccd.pkl"
sha256 = ""

[[tools.boltz2.weights]]
url    = "https://huggingface.co/boltz-community/boltz-2/resolve/main/mols.tar"
path   = "mols.tar"
sha256 = ""

[[tools.boltz2.weights]]
url    = "https://huggingface.co/boltz-community/boltz-2/resolve/main/boltz2_conf.ckpt"
path   = "boltz2_conf.ckpt"
sha256 = ""

[[tools.boltz2.weights]]
url    = "https://huggingface.co/boltz-community/boltz-2/resolve/main/boltz2_aff.ckpt"
path   = "boltz2_aff.ckpt"
sha256 = ""

[tools.chai1]
# Chai-1 — multi-modal foundation model for biomolecular structure prediction.
# Phase 2 (Bug 21): container-mode recipe. Upstream chai_lab==0.6.1 from PyPI.
# Weights (~1.3 GB) live on the host at ~/.fova/models/chai1/ and bind-mount
# to /models inside the container; chai_lab reads CHAI_DOWNLOADS_DIR=/models.
# Auth: NONE required for the default v1 weights (chaiassets.com is public).
# Set HF_TOKEN on the host BEFORE `/install chai1` only if you want to pull
# alternate Chai checkpoints from HuggingFace (most users do not).
display_name    = "Chai-1"
version         = "0.6.1"
requires_gpu    = true
disk_gb         = 6.5
image_tag       = "fova/chai1:0.6.1"
containerfile   = "chai1.Containerfile"
entrypoint      = "chai-lab fold {{ input_fasta }} {{ out_dir }}"
gpu             = true
weights_paths   = ["/models"]
timeout_seconds = 1800
# Smoke test: GPU probe via the shared verify_gpu.py fragment baked at
# /opt/_base/verify_gpu.py, then a 30-aa monomer fold against the fixture
# mounted at /work/chai1_smoke.fasta. The post-install runner is expected
# to mount internal/backends/local/testdata/ as the workspace.
smoke_test      = "python /opt/_base/verify_gpu.py && chai-lab fold /work/chai1_smoke.fasta /work/out"

# Model weights — fetched into ~/.fova/models/chai1/ by the post-build
# hook (models_cache.EnsureWeights) and bind-mounted at /models inside the
# container. Paths mirror the directory layout chai_lab expects under
# CHAI_DOWNLOADS_DIR (see chai_lab.utils.paths.chai1_component).
[[tools.chai1.weights]]
url    = "https://chaiassets.com/chai1-inference-depencencies/conformers_v1.apkl"
path   = "conformers_v1.apkl"
sha256 = "f2161256b565bbd84198da8b3e3d3978ae2f179f778d0995cd135c4c0c57c41f"

